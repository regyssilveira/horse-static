<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Servidor Estático Horse</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #4f46e5;
            margin-top: 0;
            font-size: 2rem;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .badge {
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">horse-static ativo 🚀</span>
        <h1>Servidor Estático</h1>
        <p>Este arquivo HTML está sendo servido estaticamente pelo middleware diretamente do disco.</p>
    </div>
</body>
</html>
